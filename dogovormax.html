<!DOCTYPE html>
<html>
<head>
    <title>Форма отправки данных</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Заполните форму</h2>
    <form id="dataForm">
        <label for="name">Имя:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <button type="button" id="submitBtn">Отправить данные</button>
    </form>
    <div id="status" style="margin-top: 1rem;"></div>

    <script>
        const webApp = window.WebApp;
        if (webApp) webApp.ready();

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            if (!name || !email) {
                alert('Заполните оба поля');
                return;
            }

            const payload = {
                name: name,
                email: email,
                userId: webApp?.initDataUnsafe?.user?.id || null,
                userFirstName: webApp?.initDataUnsafe?.user?.first_name || '',
                initData: webApp?.initData || '',
                timestamp: Date.now()
            };

            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Отправка...';

            try {
                const response = await fetch('https://ca1d5772-417d-4356-af4e-f93bb95e7fe4.tunnel4.com/api/send-to-max-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    statusDiv.innerHTML = '✅ Данные отправлены! Бот свяжется с вами.';
                    setTimeout(() => { if (webApp) webApp.close(); }, 2000);
                } else {
                    statusDiv.innerHTML = `❌ Ошибка сервера: ${response.status}`;
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Ошибка сети или сервера.';
                console.error(error);
            }
        });
    </script>
</body>
</html>
